<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/> 
  <title>Add Worker</title> 
  <link rel="stylesheet" href="css/styles.css" /> 
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar" role="navigation" aria-label="Primary navigation">
    <div class="nav-container">
      <a href="index.html" style="text-decoration: none;"><h1 class="nav-title">
        Garment Payroll<br>
        System</h1></a>
      <ul class="nav-links">
        <li><a href="add-worker.html">Add Workers</a></li>
        <li><a href="work-entry.html">Submit Work</a></li>
        <li><a href="manage-entries.html">Manage Entries</a></li>
        <li><a href="salary-report.html">Salary Report</a></li>
        
      </ul>
      
    </div>
  </nav>

  <div class="container">
    <h1>Add New Worker</h1> 
    <form id="workerForm"> 
      <label for="name">Worker Name:</label> 
      <input type="text" id="name" required />

      <label for="paymentType">Payment Type:</label>
      <br>
      <select id="paymentType" required>
        <option value="">--Select--</option>
        <option value="shift">Shift-Based</option>
        <option value="piece">Piece-Based</option>
      </select>
<br>
      <label for="rate">Rate (per shift or piece):</label>
      <input type="number" id="rate" required min="0.01" step="0.01" />

<br><br>
      <button type="submit" id="submitBtn">Add Worker</button>
<button type="button" id="cancelBtn" style="display:none;">Cancel</button>

    </form>
    <br>


      <div id="workerList"> 
  <h2>Workers List</h2> 
  <table id="workerTable" border="1" cellspacing="0" cellpadding="8">
    <thead>
      <tr>
        <th>Name</th>
        <th>Payment Type</th>
        <th>Rate</th>
        <th style="width: 100px;">Actions</th>

      </tr>
    </thead>
    <tbody id="tableBody">
      <!-- Workers will be inserted here -->
    </tbody>
  </table>
</div>

  </div> 

  <script src="js/storage.js"></script> 
  <script src="js/workers.js"></script> 
</body> 
</html>
